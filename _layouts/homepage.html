---
layout: default
---

<div class="hero-card homepage-hero">
  <h1>{{ page.title }}</h1>
  {% if page.hero_line %}
  <p class="hero-subtitle">{{ page.hero_line }}</p>
  {% endif %}
  {% if page.hero_body %}
  <p>{{ page.hero_body }}</p>
  {% endif %}
  {% if page.hero_ctas %}
  <div class="btn-group">
    {% for cta in page.hero_ctas %}
    <a href="{{ cta.url | relative_url }}" class="{% if cta.primary %}btn-primary{% else %}btn-secondary{% endif %}">{{ cta.label }}</a>
    {% endfor %}
  </div>
  {% endif %}
</div>

{{ content }}
