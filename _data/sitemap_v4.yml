intro: "Human-readable map of the Panta Rhei public research observatory. The site is organized around eight primary lanes -- Discover, Program, Agenda, Corpus, Results, Verify, Impact, and Engage -- with Publications and support pages preserved as the artifact, media, infrastructure, and legal layer."

